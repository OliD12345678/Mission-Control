name: Auto-merge safe PRs

on:
  # Runs after CI and Claude PR Review complete
  check_suite:
    types: [completed]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Get PR context
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Resolve PR number from the triggering event
          if [ "${{ github.event_name }}" = "pull_request_review" ]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
          else
            # check_suite: find PRs associated with this check suite
            PR_NUMBER=$(curl -s -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/commits/${{ github.event.check_suite.head_sha }}/pulls" \
              -H "Accept: application/vnd.github+json" \
              | jq -r '.[0].number // empty')
          fi

          if [ -z "$PR_NUMBER" ]; then
            echo "No PR found for this event"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

          # Fetch PR details
          PR_JSON=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/$PR_NUMBER")

          HEAD_REF=$(echo "$PR_JSON" | jq -r '.head.ref')
          STATE=$(echo "$PR_JSON" | jq -r '.state')
          MERGEABLE=$(echo "$PR_JSON" | jq -r '.mergeable // empty')

          echo "head_ref=$HEAD_REF" >> "$GITHUB_OUTPUT"
          echo "state=$STATE" >> "$GITHUB_OUTPUT"
          echo "mergeable=$MERGEABLE" >> "$GITHUB_OUTPUT"

          # Only auto-merge PRs from automation branches
          case "$HEAD_REF" in
            claude/*|hal/*)
              echo "safe_branch=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "skip=true" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Check merge conditions
        if: steps.pr.outputs.safe_branch == 'true' && steps.pr.outputs.state == 'open'
        id: checks
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
        run: |
          # 1. Resolve the head SHA for this PR
          HEAD_SHA=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/${PR_NUMBER}" \
            | jq -r '.head.sha')

          # Check check-runs (GitHub Actions use check runs, not commit statuses)
          CHECK_RUNS=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/commits/${HEAD_SHA}/check-runs" \
            -H "Accept: application/vnd.github+json")

          # Count non-auto-merge check runs that are not successful
          # Exclude this workflow's own runs to avoid circular dependency
          FAILED=$(echo "$CHECK_RUNS" | jq '[.check_runs[] | select(.name != "auto-merge" and .status == "completed" and .conclusion != "success" and .conclusion != "skipped" and .conclusion != "neutral")] | length')
          PENDING=$(echo "$CHECK_RUNS" | jq '[.check_runs[] | select(.name != "auto-merge" and .status != "completed")] | length')

          if [ "$FAILED" -gt 0 ]; then
            echo "CI has failing checks"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$PENDING" -gt 0 ]; then
            echo "CI checks still pending"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 2. Check that Claude review approved
          REVIEWS=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/${PR_NUMBER}/reviews" \
            -H "Accept: application/vnd.github+json")

          # Look for the most recent Claude review
          CLAUDE_VERDICT=$(echo "$REVIEWS" | jq -r '
            [.[] | select(.body | test("Claude Code Review"))] | last | .state // "NONE"')

          if [ "$CLAUDE_VERDICT" != "APPROVED" ]; then
            echo "Claude review not approved (state: $CLAUDE_VERDICT)"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 3. Check that only safe paths were changed
          CHANGED_FILES=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/${PR_NUMBER}/files" \
            -H "Accept: application/vnd.github+json" \
            | jq -r '.[].filename')

          UNSAFE=0
          for f in $CHANGED_FILES; do
            case "$f" in
              .github/*|.env*|Dockerfile*|docker-compose*|Makefile|*.secret*|*.pem|*.key)
                echo "Unsafe path changed: $f"
                UNSAFE=1
                ;;
            esac
          done

          if [ "$UNSAFE" -gt 0 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Merge PR
        if: steps.checks.outputs.ready == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
        run: |
          MERGE_RESULT=$(curl -s -X PUT \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/${PR_NUMBER}/merge" \
            -d '{"merge_method":"squash"}')

          MERGED=$(echo "$MERGE_RESULT" | jq -r '.merged // false')

          if [ "$MERGED" = "true" ]; then
            curl -s -X POST \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
              -d '{"body":"🤖 **Auto-merge**\n\nAll checks passed and Claude approved. Squash-merged automatically."}'
          else
            ERROR=$(echo "$MERGE_RESULT" | jq -r '.message // "unknown error"')
            curl -s -X POST \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
              -d "$(jq -n --arg err "$ERROR" \
                '{body: ("🤖 **Auto-merge**\n\nAll conditions met but merge failed: " + $err + "\n\nManual merge required.")}')"
          fi
